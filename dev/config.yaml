# =============================================================================
# CeramicSpeed Analysis — Configuration
# =============================================================================
# All paths, signal-processing parameters, and analysis settings in one place.
# Scripts load this file via own_utils.config.load_config().
#
# To switch between machines, change the paths section only.
# To run a different experiment variant, copy this file and point the script
# at the copy:  python 01_feature_generation.py --config my_variant.yaml

# --- Machine-specific paths --------------------------------------------------
# load_config() detects the current machine by matching Path.home() against
# the 'home' key below and automatically populates cfg['paths'].
# Add a new entry here for each machine; the key is just a human-readable label.
machines:
  work:
    home: "C:/Users/au808956"
    paths:
      input_dir:  "C:/Users/au808956/Documents/Repos/publication-ceramicspeed-dataset/data/"
      output_dir: "C:/Users/au808956/Documents/Repos/publication-ceramicspeed-dataset/dev/features/"

  home:
    home: "C:/Users/Bruger"
    paths:
      input_dir:  "C:/Users/Bruger/Documents/Repos/publication-ceramicspeed-dataset/data/"
      output_dir: "C:/Users/Bruger/Documents/Repos/publication-ceramicspeed-dataset/dev/features/"

# --- Paths (resolved automatically from 'machines' above) --------------------
# Kept as a fallback; overwritten at load time if the current machine is found.
paths:
  input_dir:  "C:/Users/Bruger/Documents/Repos/publication-ceramicspeed-dataset/data/"
  output_dir: "C:/Users/Bruger/Documents/Repos/publication-ceramicspeed-dataset/dev/features/"

# --- Bearing geometry --------------------------------------------------------
bearing:
  d_pw_mm: 38.0            # Mean pitch diameter [mm]

# --- Sensor frequency ranges [Hz] -------------------------------------------
# Used by 03_frequency_band_analysis.py for PSD axis limits and fixed-width
# band generation (make_frequency_bands).  Set to the *effective* bandwidth of
# each sensor, capped at the DAQ Nyquist (fs/2 = 192 kHz for the scope file).
sensors:
  AE:
    f_min:  0
    f_max:  190_000   # Nyquist for scope_*.hdf5 is 192 kHz; stay just below
  UL:
    f_min:  0
    f_max:  10_000    # Heterodyned probe: usable content below ~10 kHz only

# --- Frequency band strategy ------------------------------------------------
band_width_hz: 100_000       # Width of each fixed-width frequency band [Hz]

# --- Sensor pre-filter (applied BEFORE broadband feature extraction) ---------
# Constrains the signal to the sensor's *effective* bandwidth so that
# spectral features (center_frequency, rms_frequency, etc.) are not dominated
# by out-of-band noise.
sensor_prefilter:
  AE:
    f_lo:    0
    f_hi:  190_000   # AE broadband features limited to Nyquist
  UL:
    f_lo:    0
    f_hi:  10_000    # Restrict UL to heterodyned content only (<10 kHz)

# --- Physics-motivated frequency bands for bandpass-filtered features --------
# Each band produces a separate set of features prefixed with the label,
# e.g.  "AE_50-190kHz__mobility", "UL_0-4kHz__spectral_flatness".
# These are extracted IN ADDITION to the pre-filtered broadband features.
#
# AE bands (Nyquist = 192 kHz for scope_*.hdf5):
#   0-50 kHz   — lower-frequency AE / overlap with UL carrier range
#   50-190 kHz — primary asperity-contact AE band (EHL film transitions)
#
# UL bands (heterodyned signal, content <10 kHz):
#   0-4 kHz    — sub-band below VFD switching artefact (~5 kHz fundamental)
#   6-10 kHz   — sub-band above VFD fundamental; cleaner acoustic content
frequency_bands:
  AE:
    - {f_lo:      0, f_hi:  50_000, label: "AE_0-50kHz"}
    - {f_lo: 50_000, f_hi: 190_000, label: "AE_50-190kHz"}
  UL:
    - {f_lo:     0, f_hi:  4_000, label: "UL_0-4kHz"}
    - {f_lo: 6_000, f_hi: 10_000, label: "UL_6-10kHz"}

# --- Welch PSD parameters (used by frequency_band_analysis) -----------------
welch:
  nperseg:  4096
  noverlap: 2048
  window:   "hann"

# --- Signal-level cleaning (applied to raw voltage BEFORE feature extraction)
# These settings are passed to cleaning.clean_signal() via loading.py.
# Set 'enabled: false' to skip signal cleaning entirely (old behaviour).
signal_cleaning:
  enabled: false
  min_length: 64               # Reject signals shorter than this [samples]
  fix_nan_inf: true            # Interpolate NaN/Inf samples
  check_clipping: true         # Detect DAQ rail clipping
  clip_fraction_threshold: 0.01  # Fraction of samples at rail to flag
  check_saturation: true       # Detect suspiciously flat regions
  saturation_min_run: 50       # Minimum flat-run length to flag [samples]
  remove_outliers_z: 6.0       # Z-score threshold for spike removal (null to skip)
  outlier_window: 5            # Half-width of local median window for replacement
  reject_clipped: false        # Set true to DROP clipped sweeps entirely
  reject_saturated: false      # Set true to DROP saturated sweeps entirely

# --- Data quality filters (feature-level) ------------------------------------
filters:
  rpm_min: 300               # Discard startup/transient sweeps below this RPM
  rpm_max: 10_000            # Discard sweeps with RPM above this value
  # Optional glob patterns to restrict which HDF5 files are loaded.
  # Matched against file stems (filename without extension).
  # If omitted or empty, all .hdf5 files in input_dir are used.
  file_patterns:
    - "scope_*"

# --- Kappa regime boundaries (for visualisation colouring) ------------------
kappa:
  boundaries: [0.5, 1.0]
  labels:     ["κ < 0.5", "0.5 < κ < 1", "1 ≤ κ"]
  colors:     ["#d62728", "#ff7f0e", "#2ca02c"]

# --- Modelling --------------------------------------------------------------
modelling:
  # Hold-out split
  test_size: 0.2               # Fraction of data held out for final evaluation

  # Cross-validation (single-level, on training set only)
  cv_n_splits: 5               # Number of KFold splits for tuning + evaluation

  # Elastic Net hyperparameter search (tuned via ElasticNetCV)
  elastic_net:
    alphas: [0.0001, 0.001, 0.01, 0.1, 0.5, 1.0, 5.0, 10.0, 100.0]
    l1_ratios: [0.1, 0.3, 0.5, 0.7, 0.9, 1.0]
    max_iter: 10000

  # Polynomial Regression (PolynomialFeatures + Ridge, tuned via RidgeCV)
  polynomial:
    degree: 2                  # Polynomial degree
    alphas: null               # Ridge alpha grid; null uses log-spaced default [1e-3, 1e4]

  # Bayesian Ridge (tuned via GridSearchCV on training set)
  bayesian_ridge:
    max_iter: 300              # Max EM iterations
    param_grid:
      alpha_1: [1.0e-7, 1.0e-6, 1.0e-5]
      lambda_1: [1.0e-7, 1.0e-6, 1.0e-5]

  # LightGBM (tuned via grid search with CV on training set)
  lightgbm:
    n_estimators: 500          # Max boosting rounds (early stopping may reduce)
    learning_rate: 0.05
    max_depth: 6
    num_leaves: 31
    min_child_samples: 10
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.0             # L1 regularisation on leaf weights
    reg_lambda: 1.0            # L2 regularisation on leaf weights
    early_stopping_rounds: 50
    param_grid:
      learning_rate: [0.01, 0.05, 0.1]
      num_leaves: [15, 31, 63]
      max_depth: [4, 6, -1]

# --- Feature override (optional) --------------------------------------------
# When set, these feature lists are used in 04_modelling.py INSTEAD of the
# automatically retained set produced by 02_feature_analysis.py.
# Any feature name present in 'all_columns' (i.e. produced by
# 01_feature_generation.py) is valid here.
#
# Example — use only three hand-picked AE features and all auto-retained US:
#
# feature_override:
#   AE:
#     - mobility
#     - spectral_flatness
#   Ultrasound:        # omit a sensor key to keep its auto-retained set
#     - mobility
#     - spectral_flatness
#
# Leave the section commented out (or remove it entirely) to use the
# auto-retained features from 02_feature_analysis for both sensors.

# --- Reproducibility --------------------------------------------------------
random_state: 42
