# =============================================================================
# CeramicSpeed — Configuration
# =============================================================================
# Shared by all scripts. Load via ceramicspeed.config.load_config().
# To run a variant: python script.py --config my_variant.yaml

# =============================================================================
# Paths (machine-specific)
# =============================================================================

machines:
  work:
    home: "C:/Users/au808956"
    paths:
      input_dir:  "C:/Users/au808956/Documents/Repos/publication-ceramicspeed-dataset/data/"
      output_dir: "C:/Users/au808956/Documents/Repos/publication-ceramicspeed-dataset/outputs/"
  home:
    home: "C:/Users/Bruger"
    paths:
      input_dir:  "C:/Users/Bruger/Documents/Repos/publication-ceramicspeed-dataset/data/"
      output_dir: "C:/Users/Bruger/Documents/Repos/publication-ceramicspeed-dataset/outputs/"

paths:  # fallback if no machine matched
  input_dir:  "C:/Users/Bruger/Documents/Repos/publication-ceramicspeed-dataset/data/"
  output_dir: "C:/Users/Bruger/Documents/Repos/publication-ceramicspeed-dataset/outputs/"

# =============================================================================
# Bearing geometry
# =============================================================================

bearing:
  d_pw_mm: 38.0            # mean pitch diameter [mm]

# =============================================================================
# Data loading & filtering
# =============================================================================

filters:
  rpm_min: 50              # discard sweeps below this RPM (startup transients)
  rpm_max: 10_000
  file_patterns:
    - "scope_20260424_115654"

signal_cleaning:
  enabled: true
  fix_nan_inf: true
  check_clipping: false
  check_saturation: false
  remove_outliers_z: null   # null = disabled; set e.g. 6.0 to enable spike removal
  reject_clipped: false
  reject_saturated: false

# =============================================================================
# Signal processing
# =============================================================================

welch:
  nperseg:  4096
  noverlap: 2048
  window:   "hann"

sensors:
  AE:
    f_min: 0
    f_max: 190_000
  UL:
    f_min: 0
    f_max: 10_000

band_width_hz: 100_000

# Restrict broadband features to each sensor's effective bandwidth.
# UL is heterodyned to <20 kHz — without this, spectral features are
# dominated by out-of-band noise across the full ~5 MHz DAQ bandwidth.
sensor_prefilter:
  UL: {f_lo: 0, f_hi: 20_000}

# Additional feature set per frequency band (AE only — UL is below 20 kHz)
frequency_bands:
  AE:
    - {f_lo:       20_000, f_hi:    500_000, label: "AE_20-500kHz"}
    - {f_lo:      500_000, f_hi:  1_000_000, label: "AE_500-1000kHz"}
    - {f_lo:    1_000_000, f_hi: 2_000_000, label: "AE_1000-2000kHz"}

# =============================================================================
# Kappa regime boundaries  (EDA visualisation + feature binning)
# =============================================================================

kappa:
  boundaries: [0.5, 1.0]
  labels:     ["κ < 0.5", "0.5 < κ < 1", "1 ≤ κ"]
  colors:     ["#d62728", "#ff7f0e", "#2ca02c"]

# =============================================================================
# EDA — manual sweep selection  (eda_spectra.py)
# =============================================================================

# List specific sweep names to inspect. Omit or leave empty to use N_SWEEPS.
sweep_selection:
  # Low kappa (~0.22): very different RPM (295 vs 1285) and temperature (50 vs 95°C)
  - sweep_1475
  - sweep_8465
  # High kappa (~0.86): very different RPM (912 vs 2977) and temperature (40 vs 58°C)
  - sweep_136
  - sweep_2449

# =============================================================================
# Modelling
# =============================================================================

random_state: 42

modelling:
  test_size:   0.2
  cv_n_splits: 5
  n_repeats:   5      # repeated-CV repeats (full: 10)

  elastic_net:
    alphas:    [0.0001, 0.001, 0.01, 0.1, 0.5, 1.0, 5.0, 10.0, 100.0]
    l1_ratios: [0.1, 0.3, 0.5, 0.7, 0.9, 1.0]
    max_iter:  10000

  polynomial:
    degree: 2
    top_k:  5      # restrict to top-k features by |r| before expansion
    alphas: null

  lightgbm:
    n_estimators:        500
    learning_rate:       0.05
    max_depth:           6
    num_leaves:          31
    min_child_samples:   10
    subsample:           0.8
    colsample_bytree:    0.8
    reg_alpha:           0.0
    reg_lambda:          1.0
    early_stopping_rounds: 50
    n_trials:            20    # Optuna trials per study (outer fold + final model)
    param_grid:
      learning_rate: [0.01, 0.05, 0.1]
      num_leaves:    [15, 31, 63]
      max_depth:     [4, 6, -1]

# =============================================================================
# Debug / fast mode  (activated via --debug flag or debug.enabled: true)
# =============================================================================
# Override heavy parameters for quick sanity checks.
# Full values are in the modelling section above.

debug:
  enabled:               False  # set true to always run in debug mode
  cv_n_splits:           3      # outer folds  (full: 5)
  n_trials:              2      # Optuna trials per LightGBM fold  (full: 50)
  n_estimators:          40     # LightGBM max trees  (full: 500)
  early_stopping_rounds: 10     # LightGBM early stop  (full: 50)
  n_repeats:             2      # repeated-CV repeats in 04_evaluation  (full: 10)
  n_boot:                200    # bootstrap resamples in 04_evaluation  (full: 10000)
